# Tiny Tapeout project information
project:
  title:        "4-Tap Low-Pass FIR Filter"
  author:       "Taran Merwin"
  discord:      ""
  description:  "4-tap symmetric FIR low-pass filter with linear phase, 8-bit signed I/O and sample-valid handshake"
  language:     "Verilog"
  clock_hz:     10000000
  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"
  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_fir4_taran"
  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "sample in bit 0 (LSB)"
  ui[1]: "sample in bit 1"
  ui[2]: "sample in bit 2"
  ui[3]: "sample in bit 3"
  ui[4]: "sample in bit 4"
  ui[5]: "sample in bit 5"
  ui[6]: "sample in bit 6"
  ui[7]: "sample in bit 7 (MSB)"
  # Outputs
  uo[0]: "filtered out bit 0 (LSB)"
  uo[1]: "filtered out bit 1"
  uo[2]: "filtered out bit 2"
  uo[3]: "filtered out bit 3"
  uo[4]: "filtered out bit 4"
  uo[5]: "filtered out bit 5"
  uo[6]: "filtered out bit 6"
  uo[7]: "filtered out bit 7 (MSB)"
  # Bidirectional pins
  uio[0]: "sample valid strobe (in)"
  uio[1]: "output valid flag (out)"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""
# Do not change!
yaml_version: 6
